title: INTD 491 Project Showcase
description: Student projects for INTD 491, organized by semester and published on GitHub Pages.
url: ""
baseurl: ""
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: sunrise
locale: en-US
search: false
markdown: kramdown
permalink: pretty

collections:
  projects:
    output: true
    permalink: /projects/:path/
    sort_by: title

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
      author_profile: false
      share: false
      classes: wide
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      share: false

plugins:
  - jekyll-include-cache

atom_feed:
  hide: true

footer:
  links:
    - label: GitHub Pages
      icon: fab fa-github
      url: https://jeremykid.github.io
      baseurl: "/intd491-projects"

sass:
  style: compressed

