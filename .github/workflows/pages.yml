name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Compute deployment URL settings
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          url="https://${owner}.github.io"
          baseurl=""

          if [ "${repo}" != "${owner}.github.io" ]; then
            baseurl="/${repo}"
          fi

          {
            echo "JEKYLL_URL=${url}"
            echo "JEKYLL_BASEURL=${baseurl}"
          } >> "${GITHUB_ENV}"

      - name: Build site
        run: |
          cp _config.yml _config.deploy.yml
          {
            echo ""
            echo "url: \"${JEKYLL_URL}\""
            echo "baseurl: \"${JEKYLL_BASEURL}\""
          } >> _config.deploy.yml

          bundle exec jekyll build --config _config.yml,_config.deploy.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
